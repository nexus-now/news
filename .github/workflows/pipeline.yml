name: NEXUS NOW Pipeline

on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    name: NEXUS NOW Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Make directories
        run: mkdir -p agent_memory/training agent_memory/datasets assets/images assets/audio logs

      - name: Run pipeline
        env:
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          TWITTER_API_KEY:          ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:       ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:     ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET:    ${{ secrets.TWITTER_ACCESS_SECRET }}
          INSTAGRAM_TOKEN:          ${{ secrets.INSTAGRAM_TOKEN }}
          INSTAGRAM_BUSINESS_ID:    ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          YOUTUBE_CREDENTIALS_JSON: ${{ secrets.YOUTUBE_CREDENTIALS_JSON }}
          YOUTUBE_CHANNEL_ID:       ${{ secrets.YOUTUBE_CHANNEL_ID }}
          DRIVE_FOLDER_ID:          ${{ secrets.DRIVE_FOLDER_ID }}
          SHEET_ID_ARTICLES:        ${{ secrets.SHEET_ID_ARTICLES }}
          NEXUS_GITHUB_USERNAME:    ${{ secrets.NEXUS_GITHUB_USERNAME }}
        run: python orchestrator.py

      - name: Push to repo
        run: |
          git config user.name "NEXUS NOW Bot"
          git config user.email "ceo.nexusnow@gmail.com"
          git pull --rebase origin main
          git add -A
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "AUTO pipeline run"
          git pull --rebase origin main
          git push origin main
