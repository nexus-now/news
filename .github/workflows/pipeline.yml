name: NEXUS NOW Pipeline

on:
  schedule:
    - cron: "0 8 * * *"    # 8:00 AM UTC every day
    - cron: "0 18 * * *"   # 6:00 PM UTC every day
  workflow_dispatch:        # Allow manual trigger from Actions tab

jobs:
  run-pipeline:
    name: NEXUS NOW — Run Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0        # Full history needed for rebasing

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create required directories
        run: |
          mkdir -p agent_memory/training agent_memory/datasets
          mkdir -p assets/images assets/audio logs

      - name: Run NEXUS NOW Pipeline
        env:
          GEMINI_API_KEY:           ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:             ${{ secrets.GROQ_API_KEY }}
          TWITTER_API_KEY:          ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:       ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:     ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET:    ${{ secrets.TWITTER_ACCESS_SECRET }}
          INSTAGRAM_TOKEN:          ${{ secrets.INSTAGRAM_TOKEN }}
          INSTAGRAM_BUSINESS_ID:    ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          YOUTUBE_CREDENTIALS_JSON: ${{ secrets.YOUTUBE_CREDENTIALS_JSON }}
          YOUTUBE_CHANNEL_ID:       ${{ secrets.YOUTUBE_CHANNEL_ID }}
          DRIVE_FOLDER_ID:          ${{ secrets.DRIVE_FOLDER_ID }}
          SHEET_ID_ARTICLES:        ${{ secrets.SHEET_ID_ARTICLES }}
          NEXUS_GITHUB_USERNAME:    ${{ secrets.NEXUS_GITHUB_USERNAME }}
        run: python orchestrator.py

      - name: Push results to repository
        run: |
          git config user.name  "NEXUS NOW Bot"
          git config user.email "ceo.nexusnow@gmail.com"

          # Pull latest remote changes first to avoid non-fast-forward rejection
          git pull --rebase origin main

          # Stage all generated files
          git add -A

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "Nothing to commit — no changes generated"
          else
            git commit -m "AUTO $(date -u '+%Y-%m-%d %H:%M UTC') — $(python -c "
import json,sys
try:
  d=json.load(open('pipeline_results.json'))
  s=d[0].get('stories',[]) if d else []
  print(' | '.join([x.get('headline','?')[:35] for x in s[:2]]))
except:
  print('pipeline run')
")"
            # Push with retry logic
            for i in 1 2 3; do
              git push origin main && break
              echo "Push attempt $i failed, pulling and retrying..."
              git pull --rebase origin main
            done
          fi
        continue-on-error: false

      - name: Upload pipeline logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_number }}
          path: logs/
          retention-days: 30
