<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2020;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4444;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF0000;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="#080808" rx="4"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="100" x2="600" y2="100" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="200" stroke="#1a1a1a" stroke-width="1"/>

  <!-- SIGNAL ICON — Left side -->
  <!-- Outer arc -->
  <path d="M 58 100 A 42 42 0 0 1 100 58" stroke="#FF2020" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 58 100 A 42 42 0 0 0 100 142" stroke="#FF2020" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Middle arc -->
  <path d="M 68 100 A 28 28 0 0 1 96 72" stroke="#FF2020" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75" filter="url(#subtleGlow)"/>
  <path d="M 68 100 A 28 28 0 0 0 96 128" stroke="#FF2020" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.75" filter="url(#subtleGlow)"/>
  <!-- Inner arc -->
  <path d="M 78 100 A 14 14 0 0 1 92 86" stroke="#FF2020" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#subtleGlow)"/>
  <path d="M 78 100 A 14 14 0 0 0 92 114" stroke="#FF2020" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#subtleGlow)"/>
  <!-- Center live dot -->
  <circle cx="100" cy="100" r="6" fill="url(#redGrad)" filter="url(#glow)"/>
  <circle cx="100" cy="100" r="3" fill="#FF6666"/>

  <!-- Vertical separator line -->
  <line x1="128" y1="40" x2="128" y2="160" stroke="#2a2a2a" stroke-width="1"/>

  <!-- NEXUS text -->
  <text x="145" y="130" font-family="'Arial Black', 'Impact', sans-serif" font-size="72" font-weight="900" letter-spacing="6" fill="#F5F2ED" filter="url(#subtleGlow)">NEXUS</text>

  <!-- NOW text with red accent -->
  <text x="145" y="168" font-family="'Arial Black', 'Impact', sans-serif" font-size="36" font-weight="900" letter-spacing="14" fill="url(#redGrad)" filter="url(#subtleGlow)">NOW</text>

  <!-- Tagline -->
  <text x="148" y="185" font-family="'Arial', sans-serif" font-size="9" letter-spacing="3.5" fill="#555555">EVERY STORY · EVERY SECOND · EVERYWHERE</text>

  <!-- Top-right accent lines -->
  <line x1="520" y1="20" x2="580" y2="20" stroke="#FF2020" stroke-width="1.5" opacity="0.6"/>
  <line x1="540" y1="27" x2="580" y2="27" stroke="#FF2020" stroke-width="1" opacity="0.4"/>
  <line x1="560" y1="34" x2="580" y2="34" stroke="#FF2020" stroke-width="0.8" opacity="0.2"/>

  <!-- Bottom border accent -->
  <rect x="0" y="196" width="600" height="4" fill="url(#redGrad)"/>
  <rect x="0" y="196" width="80" height="4" fill="url(#redGrad)" opacity="0.8"/>
</svg>
