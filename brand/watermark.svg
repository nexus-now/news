<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="wRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF2020;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#CC0000;stop-opacity:1"/>
    </linearGradient>
    <filter id="wGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Transparent background -->
  <!-- Semi-transparent dark pill behind content -->
  <rect x="0" y="0" width="320" height="80" fill="rgba(8,8,8,0.75)" rx="6"/>
  <rect x="0" y="74" width="320" height="6" fill="url(#wRed)" rx="0"/>

  <!-- Signal icon mini -->
  <!-- Outer -->
  <path d="M 18 40 A 22 22 0 0 1 40 18" stroke="#FF2020" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M 18 40 A 22 22 0 0 0 40 62" stroke="#FF2020" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.4"/>
  <!-- Middle -->
  <path d="M 24 40 A 16 16 0 0 1 40 24" stroke="#FF2020" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7" filter="url(#wGlow)"/>
  <path d="M 24 40 A 16 16 0 0 0 40 56" stroke="#FF2020" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7" filter="url(#wGlow)"/>
  <!-- Inner -->
  <path d="M 30 40 A 10 10 0 0 1 40 30" stroke="#FF2020" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#wGlow)"/>
  <path d="M 30 40 A 10 10 0 0 0 40 50" stroke="#FF2020" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#wGlow)"/>
  <!-- Dot -->
  <circle cx="40" cy="40" r="5" fill="url(#wRed)" filter="url(#wGlow)"/>
  <circle cx="40" cy="40" r="2.5" fill="#FF7777"/>

  <!-- Separator -->
  <line x1="58" y1="16" x2="58" y2="64" stroke="#2a2a2a" stroke-width="1"/>

  <!-- NEXUS NOW text -->
  <text x="70" y="48" font-family="'Arial Black','Impact',sans-serif" font-size="28" font-weight="900" letter-spacing="3" fill="#F5F2ED" filter="url(#wGlow)">NEXUS</text>
  <text x="70" y="64" font-family="'Arial Black','Impact',sans-serif" font-size="14" font-weight="900" letter-spacing="8" fill="url(#wRed)">NOW</text>

  <!-- Live pulse dot -->
  <circle cx="240" cy="28" r="5" fill="#FF2020" opacity="0.9"/>
  <circle cx="240" cy="28" r="9" fill="none" stroke="#FF2020" stroke-width="1" opacity="0.4"/>

  <!-- LIVE text -->
  <text x="250" y="33" font-family="'Arial',sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#FF2020">LIVE</text>

  <!-- AI tag -->
  <rect x="238" y="44" width="60" height="16" fill="none" stroke="#333" stroke-width="1" rx="2"/>
  <text x="268" y="56" font-family="'Arial',sans-serif" font-size="9" letter-spacing="2" fill="#555" text-anchor="middle">AI GENERATED</text>
</svg>
